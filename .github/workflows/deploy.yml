name: Deploy Public Website

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./app
          file: ./app/Dockerfile.prod
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./web
          file: ./web/Dockerfile.prod
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.DROPLET_IP }}/api
            NEXT_IMAGE_HOSTS=http://${{ secrets.DROPLET_IP }}
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push nginx
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}-nginx:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 10m
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          script: |
            set -e
            REPO_OWNER=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f1 | tr '[:upper:]' '[:lower:]' 2>/dev/null || echo "$GITHUB_ACTOR")
            REPO_NAME=$(echo "$GITHUB_REPOSITORY" | cut -d'/' -f2 | tr '[:upper:]' '[:lower:]' 2>/dev/null || echo "site")
            APP_DIR="/opt/${REPO_NAME}"
            REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"
            BACKEND_IMAGE="ghcr.io/${REPO_OWNER}/${REPO_NAME}-backend:latest"
            FRONTEND_IMAGE="ghcr.io/${REPO_OWNER}/${REPO_NAME}-frontend:latest"
            NGINX_IMAGE="ghcr.io/${REPO_OWNER}/${REPO_NAME}-nginx:latest"

            if [ ! -d "$APP_DIR/.git" ]; then
              git clone "$REPO_URL" "$APP_DIR"
            else
              cd "$APP_DIR"
              git fetch origin
              git reset --hard origin/main 2>/dev/null || git reset --hard origin/master
            fi

            cd "$APP_DIR"
            if [ ! -f .env ]; then cp .env.server.example .env 2>/dev/null || cp .env.example .env; fi

            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            docker pull "$BACKEND_IMAGE"
            docker pull "$FRONTEND_IMAGE"
            docker pull "$NGINX_IMAGE"
            docker compose -f docker-compose.server.yml down --remove-orphans 2>/dev/null || true

            {
              echo "services:"
              echo "  backend:"
              echo "    image: $BACKEND_IMAGE"
              echo "    build: null"
              echo "  frontend:"
              echo "    image: $FRONTEND_IMAGE"
              echo "    build: null"
              echo "  nginx:"
              echo "    image: $NGINX_IMAGE"
              echo "    build: null"
            } > /tmp/compose-images.yml

            docker compose -f docker-compose.server.yml -f /tmp/compose-images.yml up -d --remove-orphans
            docker image prune -f >/dev/null 2>&1 || true
