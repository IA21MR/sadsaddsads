name: Generator Mocked E2E

on:
  pull_request:
    paths:
      - 'web/src/**/GeneratorView.tsx'
      - 'web/src/**/*.test.tsx'
      - 'web/e2e/**/*'
      - 'web/playwright.config.ts'
      - 'web/package.json'
      - 'web/package-lock.json'
      - 'package.json'
      - 'app/src/**/CreateProjectOrchestrator.ts'
      - 'app/src/**/InfrastructureOrchestrator.ts'
      - 'app/src/**/GeneratorScaffoldService.ts'
      - 'app/src/**/InfrastructureService.ts'
      - 'app/src/**/Organizations.Controller.ts'
      - 'cli/commands/scaffold.mjs'
      - 'scripts/smoke-scaffold.mjs'
  workflow_dispatch:

jobs:
  generator-mocked-e2e:
    name: Playwright generator-mocked
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Run mocked generator E2E
        working-directory: web
        run: npm run e2e:generator-mocked

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-generator-mocked-report
          path: web/playwright-report
          if-no-files-found: ignore
