services:
  postgres:
    image: postgres:16
    container_name: public_site_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-public_site}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-public_site}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    container_name: public_site_backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-public_site}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-public_site}?schema=public
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      TZ: America/Santiago
    volumes:
      - ./app/src:/app/src:cached
      - ./app/prisma:/app/prisma:cached
      - ./app/nest-cli.json:/app/nest-cli.json:ro
      - ./app/.swcrc:/app/.swcrc:ro
      - ./app/tsconfig.json:/app/tsconfig.json:ro
      - ./app/tsconfig.build.json:/app/tsconfig.build.json:ro
    depends_on:
      - postgres

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    container_name: public_site_frontend
    command: ["/bin/sh", "-c", "find /app/src/app -name 'page.tsx' -exec touch {} + 2>/dev/null; node node_modules/.bin/next dev -H 0.0.0.0 -p 3001"]
    ports:
      - "3001:3001"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3000}
      TZ: America/Santiago
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./web/src:/app/src:cached
      - ./web/public:/app/public:cached
      - ./web/next.config.ts:/app/next.config.ts:ro
      - ./web/tailwind.config.ts:/app/tailwind.config.ts:ro
      - ./web/tsconfig.json:/app/tsconfig.json:ro
      - nextjs_cache:/app/.next/cache
    depends_on:
      - backend

volumes:
  postgres_data:
  nextjs_cache:
